<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4f6f5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Rutina de Postura</title>
<script>try{var _t=JSON.parse(localStorage.getItem("rp_theme"));if(_t==="light"||_t==="dark")document.documentElement.setAttribute("data-theme",_t);}catch(e){}</script>
<style>
  :root{
    /* ---- Tema claro "Sereno" (por defecto) ---- */
    --bg:#f4f6f5; --bg2:#eef2f0; --card:#ffffff; --card2:#f8faf9; --sunk:#eef1f0;
    --line:#e2e8e5; --line2:#cdd6d2;
    --tx:#16211d; --tx2:#4a5a54; --mut:#6b7c74;
    --primary:#0f9d76; --primary2:#0c8163; --primary-tint:#e2f4ee; --on-primary:#ffffff;
    --accent:#5b8def; --accent-tint:#e8effc; --accent-ink:#1f4fa8;
    --rest:#e08a2b; --rest-tint:#fbefdd;
    --load:#7c6bd6; --load2:#6553bf; --load-tint:#ece8fb; --load-ink:#3a2f6b;
    --danger:#d1544f; --danger-tint:#fbe9e8;
    --diagram-ink:#2f4a41; --diagram-line:#c4d2cc; --diagram-hi:#0f9d76; --diagram-eye:#16211d;
    --diagram-bg:#eef1f0; --ring-track:#e2e8e5;
    --nav-bg:rgba(255,255,255,.92); --page-grad:#ffffff;
    --r-sm:12px; --r-md:16px; --r-lg:22px; --r-pill:999px;
    --sh-card:0 2px 10px rgba(22,33,29,.06); --sh-raised:0 8px 22px rgba(15,157,118,.16);
    --sh-focus:0 0 0 3px rgba(15,157,118,.25);
    /* alias legacy: no romper reglas existentes */
    --go:var(--primary); --go2:var(--primary2); --sky:var(--accent); --blue:var(--accent);
    --purple:var(--load); --amber:var(--rest); --slate:var(--mut);
  }
  :root[data-theme="dark"]{
    --bg:#0b1220; --bg2:#0e1826; --card:#152130; --card2:#1c2c3e; --sunk:#0e1a28;
    --line:#26374a; --line2:#37475c;
    --tx:#f1f6fb; --tx2:#c5d2dc; --mut:#93a7ba;
    --primary:#34d399; --primary2:#0e9f6e; --primary-tint:#123528; --on-primary:#04231b;
    --accent:#38bdf8; --accent-tint:#0e2436; --accent-ink:#7dbaf5;
    --rest:#f59e0b; --rest-tint:#3a2a10;
    --load:#a78bfa; --load2:#8b6df0; --load-tint:#241a44; --load-ink:#c3b3fb;
    --danger:#fca5a5; --danger-tint:#2a1414;
    --diagram-ink:#cfeede; --diagram-line:#3a5069; --diagram-hi:#5fe39a; --diagram-eye:#0c1524;
    --diagram-bg:#0e1a28; --ring-track:#22303c;
    --nav-bg:rgba(11,18,32,.92); --page-grad:#14243a;
    --sh-card:0 2px 10px rgba(0,0,0,.28); --sh-raised:0 8px 22px rgba(0,0,0,.4);
    --sh-focus:0 0 0 3px rgba(52,211,153,.3);
  }
  @media (prefers-color-scheme:dark){
    :root:not([data-theme="light"]){
      --bg:#0b1220; --bg2:#0e1826; --card:#152130; --card2:#1c2c3e; --sunk:#0e1a28;
      --line:#26374a; --line2:#37475c;
      --tx:#f1f6fb; --tx2:#c5d2dc; --mut:#93a7ba;
      --primary:#34d399; --primary2:#0e9f6e; --primary-tint:#123528; --on-primary:#04231b;
      --accent:#38bdf8; --accent-tint:#0e2436; --accent-ink:#7dbaf5;
      --rest:#f59e0b; --rest-tint:#3a2a10;
      --load:#a78bfa; --load2:#8b6df0; --load-tint:#241a44; --load-ink:#c3b3fb;
      --danger:#fca5a5; --danger-tint:#2a1414;
      --diagram-ink:#cfeede; --diagram-line:#3a5069; --diagram-hi:#5fe39a; --diagram-eye:#0c1524;
      --diagram-bg:#0e1a28; --ring-track:#22303c;
      --nav-bg:rgba(11,18,32,.92); --page-grad:#14243a;
      --sh-card:0 2px 10px rgba(0,0,0,.28); --sh-raised:0 8px 22px rgba(0,0,0,.4);
      --sh-focus:0 0 0 3px rgba(52,211,153,.3);
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:
    radial-gradient(1200px 500px at 50% -10%, #14243a 0%, var(--bg) 60%) fixed;
    color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased}
  body{max-width:600px;margin:0 auto;min-height:100vh}
  .app{padding:0 0 96px}
  .view{display:none;animation:fade .25s ease} .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  h1{font-size:23px;margin:0;font-weight:800;letter-spacing:-.4px}
  .mut{color:var(--mut)}

  .head{padding:22px 18px 6px;display:flex;align-items:center;gap:12px}
  .head img{width:38px;height:38px;border-radius:11px}
  .head .sub{color:var(--mut);font-size:13px;margin-top:1px}

  .stats{display:flex;gap:10px;margin:14px 18px 6px}
  .stat{flex:1;background:linear-gradient(150deg,#12261d,#132f24);border:1px solid #1e4a37;
    border-radius:16px;padding:12px 14px}
  .stat.b2{background:linear-gradient(150deg,#111f33,#122842);border-color:#1d3d63}
  .stat.b3{background:linear-gradient(150deg,#1c1633,#241a44);border-color:#372a63}
  .stat .v{font-size:24px;font-weight:800;line-height:1}
  .stat .l{color:var(--mut);font-size:11px;margin-top:5px;font-weight:600}

  .install{display:none;margin:12px 18px 0;background:#10233a;border:1px solid #1d3b5c;
    border-radius:14px;padding:11px 14px;font-size:13px;align-items:center;gap:10px}
  .install button{margin-left:auto;background:var(--sky);color:#04121d;border:none;
    border-radius:9px;padding:8px 12px;font-weight:800;font-size:13px}

  .grouptitle{margin:22px 18px 8px;font-size:13px;font-weight:800;color:var(--mut);
    text-transform:uppercase;letter-spacing:1px}
  .rcard{margin:0 18px 10px;background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:16px;display:flex;gap:14px;align-items:center;cursor:pointer;transition:.15s}
  .rcard:active{transform:scale(.99)}
  .rcard .em{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;
    justify-content:center;font-size:24px;flex:0 0 auto}
  .rcard .em.p{background:linear-gradient(150deg,#123528,#0e9f6e33)}
  .rcard .em.n{background:linear-gradient(150deg,#122842,#38bdf833)}
  .rcard .t{flex:1;min-width:0}
  .rcard .nm{font-weight:800;font-size:16px}
  .rcard .ds{color:var(--mut);font-size:12.5px;margin-top:3px;line-height:1.4}
  .rcard .go{color:var(--mut);font-size:22px}

  /* routine detail */
  .bar{display:flex;align-items:center;gap:12px;padding:18px 16px 8px}
  .icbtn{width:40px;height:40px;border-radius:12px;background:var(--card);border:1px solid var(--line);
    color:var(--tx);font-size:19px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto}
  .bar .ttl{font-size:19px;font-weight:800}
  .exwrap{margin:6px 16px}
  .ex{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:10px;overflow:hidden}
  .ex .top{display:flex;gap:12px;align-items:center;padding:12px;cursor:pointer}
  .diag{width:66px;height:52px;border-radius:11px;background:#0e1a28;border:1px solid var(--line);
    flex:0 0 auto;display:flex;align-items:center;justify-content:center;padding:4px}
  .diag svg{width:100%;height:100%}
  .ex .nm{font-weight:700;font-size:15px;line-height:1.2}
  .ex .meta{color:var(--mut);font-size:12px;margin-top:3px}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;letter-spacing:.2px}
  .b-diario{background:#122c4a;color:#7dbaf5} .b-carga{background:#241a44;color:#c3b3fb}
  .b-calent{background:#232c34;color:#9fb0bd} .b-opcional{background:#3a2a10;color:#f4c37a}
  .chev{color:var(--mut);font-size:16px;flex:0 0 auto;transition:.2s}
  .ex.open .chev{transform:rotate(90deg)}
  .ex .panel{display:none;padding:0 14px 14px}
  .ex.open .panel{display:block}
  .steps{list-style:none;margin:6px 0 0;padding:0;counter-reset:s}
  .steps li{position:relative;padding:7px 0 7px 34px;color:#d3dfea;font-size:13.5px;line-height:1.5;border-top:1px solid #1b2836}
  .steps li:before{counter-increment:s;content:counter(s);position:absolute;left:0;top:7px;width:22px;height:22px;
    background:var(--go2);color:#03130c;border-radius:50%;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .vbtn{display:inline-flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--line);
    color:var(--tx);border-radius:10px;padding:9px 13px;font-size:13.5px;font-weight:700;cursor:pointer;margin-top:12px}

  .cta{position:sticky;bottom:0;padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(0deg,var(--bg) 60%,transparent)}
  .btn{display:block;width:100%;border:none;border-radius:15px;padding:17px;font-size:16px;font-weight:800;
    cursor:pointer;color:#03130c;background:linear-gradient(135deg,var(--go),var(--go2));
    box-shadow:0 8px 22px rgba(16,185,129,.28)}
  .btn:active{transform:translateY(1px)}
  .btn.sec{background:var(--card);color:var(--tx);border:1px solid var(--line);box-shadow:none}

  /* guided */
  #guided{padding-bottom:20px}
  .gtop{display:flex;align-items:center;gap:10px;padding:16px 16px 6px}
  .pbar{flex:1;height:9px;background:var(--card);border-radius:20px;overflow:hidden}
  .pbar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--go),var(--sky));transition:width .35s}
  .gcount{color:var(--mut);font-size:12px;font-weight:800}
  .stage{padding:6px 18px 26px}
  .setlab{color:var(--go);font-weight:800;font-size:14px;margin-top:8px}
  .exname{font-size:25px;font-weight:800;letter-spacing:-.4px;margin:4px 0 12px;line-height:1.12}
  .gdiag{width:100%;height:172px;background:#0e1a28;border:1px solid var(--line);border-radius:16px;
    display:flex;align-items:center;justify-content:center;padding:12px;margin-bottom:6px}
  .gdiag svg{height:100%;width:auto;max-width:100%}
  .caveatbox{background:#3a2a10;border:1px solid #6b4c17;color:#f4c37a;font-size:12.5px;
    border-radius:11px;padding:10px 12px;margin:10px 0;line-height:1.5}
  .videobox{margin:12px 0 2px;border-radius:14px;overflow:hidden;background:#000;display:none}
  .videobox.show{display:block}
  .ratio{position:relative;width:100%;padding-top:56.25%}
  .ratio iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .ytlink{display:inline-block;color:var(--sky);font-size:12.5px;margin:8px 2px 0;text-decoration:none}
  .glist{list-style:none;margin:14px 0 0;padding:0;counter-reset:s}
  .glist li{position:relative;padding:8px 0 8px 34px;color:#d8e3ee;font-size:14.5px;line-height:1.5}
  .glist li:before{counter-increment:s;content:counter(s);position:absolute;left:0;top:7px;width:23px;height:23px;
    background:var(--go2);color:#03130c;border-radius:50%;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .target{text-align:center;font-size:21px;font-weight:800;margin:18px 0 4px}
  .target small{display:block;color:var(--mut);font-size:13px;font-weight:600;margin-top:4px}
  .ring{position:relative;width:200px;height:200px;margin:14px auto 0}
  .ring .val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .val b{font-size:54px;font-weight:800;font-variant-numeric:tabular-nums}
  .ring .val span{color:var(--mut);font-size:12px;font-weight:700;margin-top:2px}
  .phaselab{text-align:center;color:var(--mut);font-size:14px;font-weight:800;margin-bottom:4px}
  .timer{font-size:60px;font-weight:800;text-align:center;margin:22px 0 4px;font-variant-numeric:tabular-nums}
  .timer.rest{color:var(--rest)}
  .gbtn{width:100%;border:none;border-radius:15px;padding:17px;font-size:16px;font-weight:800;cursor:pointer;margin-top:10px}
  .gbtn.go{background:linear-gradient(135deg,var(--go),var(--go2));color:#03130c}
  .gbtn.rest{background:linear-gradient(135deg,#f59e0b,#d97706);color:#241400}
  .gbtn.sec{background:var(--card);color:var(--tx);border:1px solid var(--line)}
  .skip{display:block;width:100%;text-align:center;background:none;border:none;color:var(--mut);
    font-size:13.5px;font-weight:700;margin-top:14px;cursor:pointer;padding:8px}

  /* completion */
  .done{text-align:center;padding:46px 22px}
  .done .em{font-size:64px}
  .done h2{font-size:27px;margin:10px 0 4px}
  .done .big{font-size:46px;font-weight:800;color:var(--go);margin:14px 0 0}

  /* history + settings */
  .sect{padding:6px 18px 20px}
  .hitem{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;
    margin-bottom:9px;display:flex;align-items:center;gap:12px}
  .hitem .dot{width:38px;height:38px;border-radius:11px;background:linear-gradient(150deg,#123528,#0e9f6e33);
    display:flex;align-items:center;justify-content:center;font-size:18px;flex:0 0 auto}
  .hitem .nm{font-weight:700;font-size:14px}
  .hitem .dt{color:var(--mut);font-size:12px;margin-top:2px;text-transform:capitalize}
  .empty{color:var(--mut);text-align:center;font-size:14px;padding:36px 10px;line-height:1.6}

  .field{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
  .field .fl{font-weight:800;font-size:14px;margin-bottom:3px}
  .field .fh{color:var(--mut);font-size:12.5px;line-height:1.5}
  .switch{display:flex;align-items:center;gap:10px}
  .toggle{width:48px;height:28px;border-radius:20px;background:#33465a;position:relative;cursor:pointer;flex:0 0 auto;transition:.2s}
  .toggle.on{background:var(--go2)}
  .toggle i{position:absolute;top:3px;left:3px;width:22px;height:22px;background:#fff;border-radius:50%;transition:.2s}
  .toggle.on i{left:23px}
  .timelist{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .timepill{background:var(--card2);border:1px solid var(--line);border-radius:20px;padding:7px 12px;
    font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
  .timepill span.x{color:var(--mut);cursor:pointer;font-weight:800}
  .addrow{display:flex;gap:8px;margin-top:12px}
  .addrow input{flex:1;background:#0e1a28;border:1px solid var(--line);color:var(--tx);border-radius:11px;
    padding:11px;font-size:15px}
  .addrow button{background:var(--sky);color:#04121d;border:none;border-radius:11px;padding:0 16px;font-weight:800;cursor:pointer}
  .minibtn{background:var(--card2);border:1px solid var(--line);color:var(--tx);border-radius:10px;
    padding:9px 12px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px}
  .danger{color:#fca5a5;border-color:#7f1d1d;background:#2a1414}

  /* bottom nav */
  .nav{position:fixed;bottom:0;left:0;right:0;max-width:600px;margin:0 auto;
    background:rgba(11,18,32,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);
    display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:30}
  .nav.hide{display:none}
  .nav a{flex:1;text-align:center;color:var(--mut);font-size:11px;font-weight:700;cursor:pointer;padding:4px}
  .nav a .i{font-size:20px;display:block;margin-bottom:2px}
  .nav a.on{color:var(--go)}

  /* video overlay */
  #ov{position:fixed;inset:0;background:rgba(4,8,12,.9);display:none;z-index:60;align-items:center;justify-content:center;padding:16px}
  #ov.show{display:flex}
  .ovcard{background:var(--card);border:1px solid var(--line);border-radius:16px;width:100%;max-width:540px;overflow:hidden}
  .ovhead{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line)}
  .ovhead .t{font-weight:700;font-size:14px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ovhead .x{cursor:pointer;font-size:20px;color:var(--mut);width:30px;height:30px;display:flex;align-items:center;justify-content:center}
  .ovfoot{padding:10px 14px;font-size:12.5px;color:var(--mut)}
  .ovfoot a{color:var(--sky)}

  /* ============ Rediseño v4 — overrides de tema (planos, tokenizados) ============ */
  html,body{background:radial-gradient(1100px 460px at 50% -12%, var(--page-grad) 0%, var(--bg) 60%) fixed;color:var(--tx)}
  .stat,.stat.b2,.stat.b3{background:var(--card);border:1px solid var(--line);box-shadow:var(--sh-card)}
  .stat .v{color:var(--tx)} .stat .l{color:var(--mut)}
  .stat .v,.timer,#tv,.ring .val b,.gcount,.done .big,.exname,.target{font-variant-numeric:tabular-nums}
  .install{background:var(--accent-tint);border:1px solid var(--line)}
  .install button{background:var(--primary);color:var(--on-primary)}
  .rcard{box-shadow:var(--sh-card)}
  .rcard .em{background:var(--primary-tint);color:var(--primary)}
  .rcard .em.p{background:var(--primary-tint)}
  .rcard .em.n{background:var(--accent-tint);color:var(--accent-ink)}
  .rcard .go{color:var(--line2)}
  .diag,.gdiag{background:var(--diagram-bg)}
  .steps li{border-top:1px solid var(--line);color:var(--tx2)}
  .glist li{color:var(--tx2)}
  .b-diario{background:var(--accent-tint);color:var(--accent-ink)}
  .b-carga{background:var(--load-tint);color:var(--load-ink)}
  .b-calent{background:var(--sunk);color:var(--mut)}
  .b-opcional{background:var(--rest-tint);color:var(--rest)}
  .btn{background:var(--primary);color:var(--on-primary);box-shadow:var(--sh-raised)}
  .btn.sec{background:var(--card);color:var(--tx);border:1px solid var(--line);box-shadow:none}
  .steps li:before,.glist li:before{background:var(--primary);color:var(--on-primary)}
  .pbar>i{background:var(--primary)}
  .gbtn.go{background:var(--primary);color:var(--on-primary)}
  .gbtn.rest{background:var(--rest);color:#241400}
  .gbtn.sec{background:var(--card);color:var(--tx);border:1px solid var(--line)}
  .caveatbox{background:var(--rest-tint);border:1px solid var(--rest);color:var(--rest)}
  .hitem{box-shadow:var(--sh-card)}
  .hitem .dot{background:var(--primary-tint);color:var(--primary)}
  .field{box-shadow:var(--sh-card)}
  .toggle{background:var(--line2)} .toggle.on{background:var(--primary)}
  .addrow input{background:var(--sunk);color:var(--tx)}
  .addrow button{background:var(--primary);color:var(--on-primary)}
  .minibtn.danger,.danger{color:var(--danger);border-color:var(--danger);background:var(--danger-tint)}
  .nav{background:var(--nav-bg)}
  .nav a.on{color:var(--primary)}
  .icbtn{color:var(--tx2)}
  .nav a .i svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;display:block;margin:0 auto 2px}
  /* control de tema compacto (fila de ajustes) */
  .themeseg{display:inline-flex;flex:0 0 auto;margin-left:auto;background:var(--sunk);border:1px solid var(--line);border-radius:var(--r-pill);padding:3px;gap:2px}
  .themeseg button{border:none;background:transparent;color:var(--mut);border-radius:var(--r-pill);padding:6px 11px;font-size:12px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:5px;min-height:34px}
  .themeseg button svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .themeseg button.on{background:var(--card);color:var(--primary);box-shadow:var(--sh-card)}
  /* tarjeta "Hoy" */
  .today{margin:14px 16px 4px;background:var(--card);border:1px solid var(--line);box-shadow:var(--sh-card);border-radius:var(--r-lg);padding:16px}
  .today .kick{font-size:11px;font-weight:800;letter-spacing:1px;color:var(--primary);text-transform:uppercase}
  .today .tt{font-size:21px;font-weight:800;margin-top:6px;letter-spacing:-.3px;line-height:1.15}
  .today .mt{font-size:12.5px;color:var(--mut);margin-top:4px;line-height:1.4}
  .today-go{margin-top:13px;width:100%;border:none;border-radius:var(--r-md);padding:14px;font-size:15px;font-weight:800;color:var(--on-primary);background:var(--primary);box-shadow:var(--sh-raised);cursor:pointer}
  .today-go:active{transform:translateY(1px)}
  .today-go.sec{background:var(--sunk);color:var(--tx);box-shadow:none;border:1px solid var(--line)}
  /* calendario */
  .cal{background:var(--card);border:1px solid var(--line);box-shadow:var(--sh-card);border-radius:16px;padding:12px 12px 14px;margin-bottom:14px}
  .calhead{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .calhead .m{flex:1;text-align:center;font-weight:800;font-size:15px;text-transform:capitalize}
  .calnav{width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:var(--sunk);color:var(--tx2);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .calgrid .wd{text-align:center;font-size:10.5px;font-weight:800;color:var(--mut);padding:2px 0 4px}
  .calcell{aspect-ratio:1/1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:13px;font-weight:700;color:var(--tx2);cursor:pointer;border:1px solid transparent}
  .calcell.empty{visibility:hidden}
  .calcell.has{color:var(--tx)}
  .calcell .dots{display:flex;gap:2px;height:6px}
  .calcell .cdot{width:6px;height:6px;border-radius:50%}
  .cdot.p{background:var(--primary)} .cdot.n{background:var(--accent)} .cdot.g{background:var(--load)}
  .calcell.today{border-color:var(--primary)}
  .calcell.sel{background:var(--primary-tint)}
  /* detalle de rutina: checklist + empezar aquí */
  .routprog{margin:0 18px 6px;font-size:12.5px;font-weight:800;color:var(--primary)}
  .ex .top{gap:10px;align-items:center}
  .exck{width:26px;height:26px;border-radius:50%;border:2px solid var(--line2);background:transparent;color:var(--on-primary);font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto;cursor:pointer}
  .ex.checked .exck{background:var(--primary);border-color:var(--primary)}
  .ex.checked .nm{color:var(--mut);text-decoration:line-through}
  .exstart{width:36px;height:36px;border-radius:10px;background:var(--primary-tint);color:var(--primary);font-size:13px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;cursor:pointer}
  /* figuras multi-paso (paso 1/2/3) */
  .frames{display:flex;gap:8px;margin:4px 0 10px}
  .frame{flex:1;min-width:0;background:var(--diagram-bg);border:1px solid var(--line);border-radius:12px;padding:8px 6px 7px;display:flex;flex-direction:column;align-items:center;gap:5px}
  .frame .fnum{width:20px;height:20px;border-radius:50%;background:var(--primary);color:var(--on-primary);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums}
  .frame .fdiag{width:100%;height:74px}
  .frame .fdiag svg{width:100%;height:100%;display:block}
  .frame .fcap{font-size:10px;color:var(--tx2);text-align:center;font-weight:700;line-height:1.15}
  .gframes{margin:2px 0}
  #guided .frame .fdiag{height:94px}
  /* semana / planificador */
  .wkhead{display:flex;align-items:baseline;justify-content:space-between;padding:4px 18px 0}
  .wkhead .t{font-size:11.5px;font-weight:800;color:var(--mut);text-transform:uppercase;letter-spacing:.8px}
  .week{display:flex;gap:5px;padding:8px 16px 4px}
  .day{flex:1;background:var(--card);border:1px solid var(--line);box-shadow:var(--sh-card);border-radius:12px;padding:8px 2px;text-align:center;cursor:pointer;min-width:0}
  .day .d{font-size:10.5px;font-weight:800;color:var(--mut)}
  .day .tag{font-size:8.5px;font-weight:800;margin-top:4px;color:var(--line2);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .day.on{border-color:var(--primary)} .day.on .d{color:var(--primary)}
  .day.d-p .tag{color:var(--primary)} .day.d-n .tag{color:var(--accent)} .day.d-g .tag{color:var(--load)} .day.rest .tag{color:var(--mut)}
  /* registro de peso */
  .logrow{display:flex;gap:10px;margin-top:4px}
  .stepper{flex:1;background:var(--card);border:1px solid var(--line);box-shadow:var(--sh-card);border-radius:14px;padding:10px}
  .stepper .lab{font-size:10.5px;font-weight:800;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;text-align:center}
  .stepper .row{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
  .stepper .row b{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums}
  .stepper .row b small{font-size:12px;font-weight:700;color:var(--mut)}
  .sq{width:38px;height:38px;border-radius:10px;background:var(--sunk);border:1px solid var(--line);color:var(--primary);font-size:20px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .last{margin:11px 0 4px;background:var(--load-tint);border:1px solid var(--load);border-radius:11px;padding:9px 12px;font-size:12px;color:var(--load-ink);font-weight:600}
  .sets{margin:11px 0 0;display:flex;flex-direction:column;gap:6px}
  .setline{display:flex;align-items:center;gap:9px;font-size:12.5px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 11px}
  .setline .n{color:var(--mut);font-weight:800;width:52px} .setline .v{font-weight:700} .setline .ck{margin-left:auto;color:var(--primary);font-weight:800}
  .restadj{display:flex;gap:8px;margin-top:8px}
  .rcard .em.g{background:var(--load-tint);color:var(--load-ink)}
  /* progreso */
  .chartcard{margin:0 16px 10px;background:var(--card);border:1px solid var(--line);box-shadow:var(--sh-card);border-radius:15px;padding:13px 12px 8px}
  .chartcard .ct{font-size:14px;font-weight:800;margin:0 2px 2px}
  .chartcard .cs{font-size:11.5px;color:var(--mut);font-weight:600;margin:0 2px 8px}
  /* overlay planificador */
  #planov{position:fixed;inset:0;background:rgba(4,8,12,.55);display:none;z-index:60;align-items:flex-end;justify-content:center}
  #planov.show{display:flex}
  #planov .ovcard{border-radius:18px 18px 0 0;max-width:600px;width:100%;max-height:80vh;overflow:auto}
  .planbody{padding:10px 12px calc(16px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:7px}
  .planopt{display:flex;align-items:center;gap:11px;padding:12px;border:1px solid var(--line);border-radius:12px;background:var(--card2);cursor:pointer;font-weight:700;font-size:14px;color:var(--tx)}
  .planopt .em{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:var(--primary-tint);flex:0 0 auto}
  /* foco visible (accesibilidad) */
  button:focus-visible,a:focus-visible,input:focus-visible,.toggle:focus-visible,.rcard:focus-visible,.ex .top:focus-visible{outline:none;box-shadow:var(--sh-focus)}
  /* recolor de diagramas y anillo del timer: atributos inline -> tokens de tema */
  [stroke="#cfeede"]{stroke:var(--diagram-ink)} [fill="#cfeede"]{fill:var(--diagram-ink)}
  [stroke="#5fe39a"]{stroke:var(--diagram-hi)} [fill="#5fe39a"]{fill:var(--diagram-hi)}
  [fill="#0c1524"]{fill:var(--diagram-eye)}
  [stroke="#3a5069"],[stroke="#46596f"]{stroke:var(--diagram-line)}
  [stroke="#22303c"]{stroke:var(--ring-track)} [stroke="#34d399"]{stroke:var(--primary)}
</style>
</head>

/* audio + haptics */
function beep(){try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();if(actx.state==="suspended")actx.resume();
  const t=actx.currentTime;[[880,t],[1175,t+.42]].forEach(([f,st])=>{const o=actx.createOscillator(),g=actx.createGain();
  o.connect(g);g.connect(actx.destination);o.type="sine";o.frequency.value=f;g.gain.setValueAtTime(.0001,st);
  g.gain.exponentialRampToValueAtTime(.3,st+.02);g.gain.exponentialRampToValueAtTime(.0001,st+.34);o.start(st);o.stop(st+.36);});}catch(e){}
  try{if(navigator.vibrate)navigator.vibrate([120,60,120]);}catch(e){}}
function prime(){try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();if(actx.state==="suspended")actx.resume();}catch(e){}}

  let dark=false;try{dark=(pref==="dark")||(pref==="auto"&&matchMedia("(prefers-color-scheme:dark)").matches);}catch(e){}
  const mc=document.querySelector('meta[name="theme-color"]');if(mc)mc.setAttribute("content",dark?"#0b1220":"#f4f6f5");}

/* storage */

function jset(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true;}catch(e){return false;}}
function ds(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function today(){return ds(new Date());}
function yesterday(){const d=new Date();d.setDate(d.getDate()-1);return ds(d);}

function completeDay(){const s=loadStreak(),t=today();if(s.last!==t){s.count=(s.last===yesterday())?s.count+1:1;s.last=t;s.total=(s.total||0)+1;}s.best=Math.max(s.best||0,s.count);jset("rp_streak",s);return s;}
function loadHist(){return jget("rp_history",[]);}

/* checklist diaria + figuras multi-paso + empezar en cualquier ejercicio */
function loadChecks(){return jget("rp_checks",{});}
function checksFor(rk){const d=loadChecks()[today()]||{};return d[rk]||{};}
function isChecked(rk,id){return !!checksFor(rk)[id];}
function markCheck(rk,id,val){const all=loadChecks(),t=today();all[t]=all[t]||{};all[t][rk]=all[t][rk]||{};
  if(val===false)delete all[t][rk][id];else all[t][rk][id]=true;jset("rp_checks",all);
  if(curRoutine===rk)updateRoutineProgress();}

  const el=$("ex_"+i);if(el){el.classList.toggle("checked",!cur);const ck=el.querySelector(".exck");if(ck)ck.textContent=!cur?"✓":"";}}
function routineProgressText(k){const r=ROUTINES[k],c=checksFor(k);let n=0;r.list.forEach(id=>{if(c[id])n++;});return `${n} de ${r.list.length} hechos hoy`;}
function updateRoutineProgress(){const el=$("routProg");if(el)el.textContent=routineProgressText(curRoutine);}
function framesStrip(id){const f=(typeof FRAMES!=="undefined")?FRAMES[id]:null;if(!f||!f.frames||f.frames.length<2)return "";
  return `<div class="frames">`+f.frames.map((sv,i)=>`<div class="frame"><div class="fnum">${i+1}</div><div class="fdiag">${sv}</div><div class="fcap">${esc((f.captions&&f.captions[i])||"")}</div></div>`).join("")+`</div>`;}

/* ===== GIMNASIO: registro de peso, planificador semanal, progreso ===== */
let sessionLog={}, curW=null, curReps=null, restR=0, planDay=0;
const DOW=["L","M","X","J","V","S","D"], DOWLONG=["lunes","martes","miércoles","jueves","viernes","sábado","domingo"];
function todayDow(){return (new Date().getDay()+6)%7;}
function loadLogs(){return jget("rp_logs",{});}
function lastLog(exId){const a=loadLogs()[exId];return (a&&a.length)?a[a.length-1]:null;}
function persistSession(){const logs=loadLogs(),t=today();let ch=false;
  Object.keys(sessionLog).forEach(id=>{const st=sessionLog[id];if(st&&st.length){logs[id]=logs[id]||[];logs[id].push({date:t,sets:st});if(logs[id].length>150)logs[id]=logs[id].slice(-150);ch=true;}});
  if(ch)jset("rp_logs",logs);sessionLog={};}
function fmtW(w){return (Math.round(w*10)%10===0)?String(Math.round(w)):Number(w).toFixed(1);}
function adjW(d){const s=steps[stepi];curW=Math.max(0,Math.round((curW+d)*10)/10);const el=$("lw");if(el)el.innerHTML=fmtW(curW)+' <small>'+(s.unit||'kg')+'</small>';}
function adjR(d){curReps=Math.max(1,curReps+d);const el=$("lr");if(el)el.textContent=curReps;}
function logSet(){const s=steps[stepi];(sessionLog[s.id]=sessionLog[s.id]||[]).push({w:curW,reps:curReps});afterAction();}
function adjRest(d){restR=Math.max(0,restR+d);const el=$("rv");if(el)el.textContent=restR;}
function loadPlan(){return jget("rp_plan",[null,null,null,null,null,null,null]);}
function planShort(v){if(v==="rest")return "Descanso";if(v&&ROUTINES[v]){let n=ROUTINES[v].name;if(n.indexOf("—")>=0)n=n.split("—")[1].trim();return n.replace(/^Tren\s+/i,"");}return "+";}
function renderWeek(){const p=loadPlan();let h=`<div class="wkhead"><div class="t">Tu semana</div></div><div class="week">`;
  for(let d=0;d<7;d++){const v=p[d],cls=["day"];if(d===todayDow())cls.push("on");if(v==="rest")cls.push("rest");else if(v&&ROUTINES[v])cls.push("d-"+routColor(v));
    h+=`<div class="${cls.join(' ')}" onclick="openPlan(${d})" role="button" aria-label="Editar ${DOWLONG[d]}"><div class="d">${DOW[d]}</div><div class="tag">${esc(planShort(v))}</div></div>`;}
  h+=`</div>`;const el=$("weekCard");if(el)el.innerHTML=h;}
function openPlan(d){planDay=d;$("planTitle").textContent=DOWLONG[d].charAt(0).toUpperCase()+DOWLONG[d].slice(1);
  let h=`<div class="planopt" onclick="setPlan('rest')"><div class="em">😴</div>Descanso</div>`;
  GROUPS.forEach(g=>g.keys.forEach(k=>{const r=ROUTINES[k];h+=`<div class="planopt" onclick="setPlan('${k}')"><div class="em">${r.emoji}</div>${esc(r.name)}</div>`;}));
  h+=`<div class="planopt" onclick="setPlan(null)"><div class="em">✕</div>Sin asignar</div>`;
  $("planBody").innerHTML=h;$("planov").classList.add("show");}
function closePlan(){$("planov").classList.remove("show");}
function setPlan(v){const p=loadPlan();p[planDay]=v;jset("rp_plan",p);closePlan();renderWeek();renderTodayCard(loadStreak());}
function bestSet(sets){let b=null;(sets||[]).forEach(x=>{if(!b||x.w>b.w)b=x;});return b;}
function spark(vals){const w=286,h=64,pad=8,min=Math.min.apply(null,vals),max=Math.max.apply(null,vals),rng=(max-min)||1;
  const pts=vals.map((v,i)=>{const x=pad+(w-2*pad)*(vals.length===1?0.5:i/(vals.length-1));const y=h-pad-(h-2*pad)*((v-min)/rng);return x.toFixed(1)+","+y.toFixed(1);});
  const cs=pts.map(p=>{const a=p.split(",");return `<circle cx="${a[0]}" cy="${a[1]}" r="3" fill="var(--primary)"/>`;}).join("");
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none"><polyline points="${pts.join(' ')}" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${cs}</svg>`;}
function renderProgress(){const logs=loadLogs(),ids=Object.keys(logs).filter(id=>logs[id]&&logs[id].length),s=loadStreak();
  let b=`<div class="stats" style="margin:0 0 14px">
    <div class="stat"><div class="v">${s.total||0}</div><div class="l">✅ sesiones</div></div>
    <div class="stat b2"><div class="v">${s.count||0}</div><div class="l">🔥 racha</div></div>
    <div class="stat b3"><div class="v">${ids.length}</div><div class="l">🏋️ ejercicios</div></div></div>`;
  if(!ids.length){b+=`<div class="empty" style="padding:30px 12px">Aún no has registrado series de gimnasio.<br>En una rutina con carga, registra el peso de cada serie y aquí verás tu progreso.</div>`;}
  else{ids.sort((a,c)=>logs[c].length-logs[a].length);
    ids.forEach(id=>{const recs=logs[id],series=recs.map(r=>{const bs=bestSet(r.sets);return bs?bs.w:0;});
      const name=(EX[id]&&EX[id].name)||id,unit=(EX[id]&&EX[id].unit)||'kg',best=Math.max.apply(null,series),bs=bestSet(recs[recs.length-1].sets);
      b+=`<div class="chartcard"><div class="ct">${esc(name)}</div><div class="cs">Récord ${fmtW(best)} ${unit} · última ${bs?fmtW(bs.w)+' '+unit+' × '+bs.reps:'—'} · ${recs.length} sesiones</div>${series.length>1?spark(series):''}</div>`;});}
  $("progBody").innerHTML=b;}

/* ---------- BUILD STEPS ---------- */
function buildSteps(k){const out=[],list=ROUTINES[k].list,total=list.length;
  list.forEach((id,idx)=>{const e=EX[id],base={id,name:e.name,steps:e.steps,tag:e.tag,caveat:!!e.caveat,exI:idx+1,exN:total,load:!!e.load,unit:e.unit||"kg"};
    if(e.type==="reps"||e.type==="reps_side"){for(let s=1;s<=e.sets;s++)out.push(Object.assign({},base,{kind:"count",reps:e.reps,perSide:e.type==="reps_side",
      label:`Serie ${s} de ${e.sets}`+(e.type==="reps_side"?" · cada lado":""),restAfter:s<e.sets?e.rest:0,first:s===1}));}
    else if(e.type==="hold"){for(let s=1;s<=e.sets;s++)out.push(Object.assign({},base,{kind:"timer",seconds:e.holdSec,
      label:`Mantén ${s} de ${e.sets}`,restAfter:s<e.sets?(e.rest||15):0,first:s===1}));}
    else if(e.type==="hold_side"){for(let s=1;s<=e.sets;s++){
      out.push(Object.assign({},base,{kind:"timer",seconds:e.holdSec,label:`Serie ${s}/${e.sets} · Izquierdo`,restAfter:0,first:s===1}));
      out.push(Object.assign({},base,{kind:"timer",seconds:e.holdSec,label:`Serie ${s}/${e.sets} · Derecho`,restAfter:s<e.sets?(e.rest||10):0,first:false}));}}
  });return out;}

/* ---------- GUIDED ---------- */
function startRoutine(from){prime();sessionLog={};curW=null;curReps=null;steps=buildSteps(curRoutine);stepi=0;
  if(from){const i=steps.findIndex(s=>s.id===from);if(i>=0)stepi=i;}
  show("guided");renderStep();}
function guidedExit(){clearTimer();persistSession();show("home");renderHome();}
function guidedBack(){clearTimer();if(stepi>0){stepi--;renderStep();}else{guidedExit();}}
function guidedSkipExercise(){clearTimer();const cur=steps[stepi].id;let i=stepi;while(i<steps.length&&steps[i].id===cur)i++;
  if(i>=steps.length)finish();else{stepi=i;renderStep();}}

function frame(inner){const s=steps[stepi],prog=Math.round(stepi/steps.length*100);
  return `<div class="gtop"><div class="icbtn" onclick="guidedBack()">‹</div>
    <div class="pbar"><i style="width:${prog}%"></i></div>
    <div class="gcount">${s.exI}/${s.exN}</div><div class="icbtn" onclick="guidedExit()">✕</div></div>
    <div class="stage"><div class="setlab">${s.label}</div><div class="exname">${s.name}</div>
    ${(typeof FRAMES!=="undefined"&&FRAMES[s.id])?`<div class="gframes">${framesStrip(s.id)}</div>`:`<div class="gdiag">${DIAG[s.id]||""}</div>`}
    ${s.caveat?'<div class="caveatbox">⚠️ Evidencia floja: los ejercicios faciales muestran, en el mejor caso, mejoras modestas tras meses. Hazlo sin grandes expectativas.</div>':''}
    <ul class="glist">${s.steps.map(t=>`<li>${esc(t)}</li>`).join("")}</ul>
    <div class="vbtn" onclick="toggleGVid()">▶ Ver video</div>
    <div id="gvid" class="videobox"><div class="ratio"><iframe id="gvframe" allow="accelerometer; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe></div></div>
    <div><a class="ytlink" target="_blank" rel="noopener" href="${watch(VID[s.id])}">Abrir en YouTube ↗</a></div>
    ${inner}
    <button class="skip" onclick="guidedSkipExercise()">Saltar ejercicio ⏭</button></div>`;}

function renderStep(){clearTimer();const s=steps[stepi];let inner;if(s.first){curW=null;curReps=null;}
  if(s.kind==="count"){
    if(s.load){const ll=lastLog(s.id),ds=sessionLog[s.id]||[];
      if(curW==null)curW=ds.length?ds[ds.length-1].w:(ll&&ll.sets.length?ll.sets[ll.sets.length-1].w:10);
      if(curReps==null)curReps=ds.length?ds[ds.length-1].reps:(ll&&ll.sets.length?ll.sets[ll.sets.length-1].reps:s.reps);
      const lastTxt=ll?('La última vez: '+ll.sets.map(x=>fmtW(x.w)+'×'+x.reps).join(', ')):'Primera vez — registra tu peso';
      const setsTxt=ds.map((x,i)=>`<div class="setline"><span class="n">Serie ${i+1}</span><span class="v">${fmtW(x.w)} ${s.unit} × ${x.reps}</span><span class="ck">✓</span></div>`).join("");
      inner=`<div class="logrow">
        <div class="stepper"><div class="lab">Peso</div><div class="row"><button class="sq" onclick="adjW(-2.5)" aria-label="Bajar peso">−</button><b id="lw">${fmtW(curW)} <small>${s.unit}</small></b><button class="sq" onclick="adjW(2.5)" aria-label="Subir peso">+</button></div></div>
        <div class="stepper"><div class="lab">Reps</div><div class="row"><button class="sq" onclick="adjR(-1)" aria-label="Menos reps">−</button><b id="lr">${curReps}</b><button class="sq" onclick="adjR(1)" aria-label="Más reps">+</button></div></div>

    }else{inner=`<div class="target">Haz ${s.reps} repeticiones${s.perSide?' <small>por cada lado</small>':''}</div>
    <button class="gbtn go" onclick="afterAction()">Serie completada ✓</button>`;}
  }
  else{const C=(2*Math.PI*90).toFixed(1);
    inner=`<div class="ring"><svg width="200" height="200" viewBox="0 0 200 200"><g transform="rotate(-90 100 100)">
      <circle cx="100" cy="100" r="90" stroke="#22303c" stroke-width="13" fill="none"/>
      <circle id="arc" cx="100" cy="100" r="90" stroke="#34d399" stroke-width="13" fill="none" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="0"/></g></svg>
      <div class="val"><b id="tv">${s.seconds}</b><span>segundos</span></div></div>
      <button class="gbtn go" id="startT" onclick="startTimer()">▶ Iniciar (${s.seconds}s)</button>`;}
  $("guided").innerHTML=frame(inner);}

let gVidOn=false;
function toggleGVid(){gVidOn=!gVidOn;const b=$("gvid");if(gVidOn){$("gvframe").src=embed(VID[steps[stepi].id]);b.classList.add("show");}else{$("gvframe").src="";b.classList.remove("show");}}
function startTimer(){const s=steps[stepi],C=2*Math.PI*90;let r=s.seconds;const btn=$("startT");if(btn)btn.style.display="none";
  const arc=$("arc");const upd=()=>{$("tv").textContent=r;if(arc)arc.style.strokeDashoffset=(C*(1-r/s.seconds)).toFixed(1);};upd();
  tId=setInterval(()=>{r--;if(r<=0){clearTimer();$("tv").textContent=0;if(arc)arc.style.strokeDashoffset=C;beep();afterAction();}else upd();},1000);}
function afterAction(){const s=steps[stepi];if(s.restAfter>0)renderRest(s.restAfter);else advance();}
function renderRest(sec){clearTimer();restR=sec;
  $("guided").innerHTML=frame(`<div class="phaselab">Descanso</div><div class="timer rest" id="rv">${restR}</div>
    <div class="restadj"><button class="gbtn sec" onclick="adjRest(-30)">−30 s</button><button class="gbtn sec" onclick="adjRest(30)">+30 s</button></div>
    <button class="gbtn rest" onclick="skipRest()">Saltar descanso →</button>`);
  tId=setInterval(()=>{restR--;const el=$("rv");if(restR<=0){clearTimer();beep();advance();}else if(el)el.textContent=restR;},1000);}
function skipRest(){clearTimer();advance();}
function advance(){clearTimer();const prev=steps[stepi];stepi++;
  if(prev&&(stepi>=steps.length||steps[stepi].id!==prev.id))markCheck(curRoutine,prev.id,true);
  if(stepi>=steps.length)finish();else renderStep();}

const MONTHS=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
let calY=null,calM=null,calSel=null;
function histIndex(){const h=loadHist(),idx={};h.forEach(x=>{let k=null;
  if(x.date&&x.date.indexOf("/")>0){const p=x.date.split("/");k=p[2]+"-"+p[1].padStart(2,"0")+"-"+p[0].padStart(2,"0");}
  else if(x.iso){k=ds(new Date(x.iso));}
  if(k){(idx[k]=idx[k]||[]).push(x);}});return idx;}
function routColor(key){const r=ROUTINES[key];if(!r)return "g";return r.cls==="n"?"n":r.cls==="p"?"p":"g";}
function emojiFor(key){return (ROUTINES[key]&&ROUTINES[key].emoji)||"🧍";}
function calShift(d){calM+=d;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}renderHistory();}
function calPick(k){calSel=k;renderHistory();}
function renderHistory(){const s=loadStreak(),idx=histIndex(),now=new Date();
  if(calY==null){calY=now.getFullYear();calM=now.getMonth();}
  if(calSel==null)calSel=today();
  let b=`<div class="stats" style="margin:0 0 14px">
    <div class="stat"><div class="v">${s.count||0}</div><div class="l">🔥 días seguidos</div></div>
    <div class="stat b2"><div class="v">${s.best||0}</div><div class="l">🏆 mejor</div></div>
    <div class="stat b3"><div class="v">${s.total||0}</div><div class="l">✅ sesiones</div></div></div>`;
  b+=`<div class="cal"><div class="calhead"><div class="calnav" onclick="calShift(-1)" role="button" aria-label="Mes anterior">‹</div>
    <div class="m">${MONTHS[calM]} ${calY}</div>
    <div class="calnav" onclick="calShift(1)" role="button" aria-label="Mes siguiente">›</div></div><div class="calgrid">`;
  ["L","M","X","J","V","S","D"].forEach(w=>b+=`<div class="wd">${w}</div>`);
  const first=new Date(calY,calM,1),lead=(first.getDay()+6)%7,dim=new Date(calY,calM+1,0).getDate();
  for(let i=0;i<lead;i++)b+=`<div class="calcell empty"></div>`;
  for(let d=1;d<=dim;d++){const key=calY+"-"+String(calM+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    const sess=idx[key]||[],cls=["calcell"];if(sess.length)cls.push("has");if(key===today())cls.push("today");if(key===calSel)cls.push("sel");
    const cols=[];sess.forEach(x=>{const c=routColor(x.key);if(cols.indexOf(c)<0)cols.push(c);});
    const dots=cols.slice(0,3).map(c=>`<span class="cdot ${c}"></span>`).join("");
    b+=`<div class="${cls.join(" ")}" onclick="calPick('${key}')"><span>${d}</span><span class="dots">${dots}</span></div>`;}
  b+=`</div></div>`;
  const sel=idx[calSel]||[],p=calSel.split("-");
  b+=`<div class="grouptitle" style="margin:2px 2px 8px">${p[2]}/${p[1]}/${p[0]}</div>`;
  if(!sel.length)b+=`<div class="empty" style="padding:16px 10px">Sin actividad este día.<br>Completa una rutina y quedará registrada aquí.</div>`;
  else b+=sel.map(x=>`<div class="hitem"><div class="dot">${emojiFor(x.key)}</div>
    <div style="flex:1"><div class="nm">${esc(x.name)}</div><div class="dt">${x.day||""} · ${x.time||""}</div></div></div>`).join("");
  $("histBody").innerHTML=b;}

  catch(e){try{new Notification(title,{body});}catch(_){}}}
function scheduleRem(){remTimers.forEach(t=>clearTimeout(t));remTimers=[];const r=loadRem();if(!r.enabled)return;
  r.times.forEach(hm=>{const [h,m]=hm.split(":").map(Number);const now=new Date();const t=new Date();t.setHours(h,m,0,0);
    if(t<=now)t.setDate(t.getDate()+1);const ms=t-now;
    if(ms<24*3600*1000)remTimers.push(setTimeout(()=>{showNotif("Hora de tu rutina 🧍","Abre la app y mantén tu racha.");scheduleRem();},ms));
    // best-effort background schedule
    try{navigator.serviceWorker?.ready.then(reg=>{if("showTrigger" in Notification.prototype){reg.showNotification("Hora de tu rutina 🧍",
      {body:"Abre la app y mantén tu racha.",icon:"icon-192.png",tag:"rp-"+hm,showTrigger:new TimestampTrigger(t.getTime())});}});}catch(e){}
  });}
